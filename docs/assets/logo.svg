<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#133D72"/>
      <stop offset="100%" stop-color="#0F2847"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="teal-line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.5">
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="0" y1="40" x2="200" y2="40"/>
    <line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="120" x2="200" y2="120"/>
    <line x1="0" y1="160" x2="200" y2="160"/>
  </g>

  <!-- Connection lines (knowledge graph / teal) -->
  <g stroke="url(#teal-line)" stroke-width="1.5" stroke-linecap="round">
    <line x1="60" y1="140" x2="100" y2="100"/>
    <line x1="140" y1="140" x2="100" y2="100"/>
    <line x1="100" y1="100" x2="100" y2="60"/>
    <line x1="70" y1="120" x2="100" y2="100"/>
    <line x1="130" y1="120" x2="100" y2="100"/>
    <line x1="100" y1="100" x2="75" y2="75"/>
    <line x1="100" y1="100" x2="125" y2="75"/>
  </g>

  <!-- Geometric w+u fusion structure -->
  <g stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left stroke of 'u' / left peak of 'w' -->
    <path d="M55 85 L65 130 L85 85" opacity="0.9"/>
    <!-- Right stroke of 'u' / right peak of 'w' -->
    <path d="M115 85 L135 130 L145 85" opacity="0.9"/>
    <!-- Center connection — the shared valley/bridge -->
    <path d="M85 85 Q100 130 115 85" opacity="0.95"/>
  </g>

  <!-- Engineering braces / slashes abstraction (bottom) -->
  <g stroke="#2DD4BF" stroke-width="1.8" stroke-linecap="round" opacity="0.7">
    <path d="M65 148 Q60 155 65 162"/>
    <path d="M75 145 L90 165"/>
    <path d="M125 148 Q130 155 125 162"/>
    <path d="M115 145 L100 165"/>
  </g>

  <!-- Data nodes -->
  <g>
    <!-- Center node (brightest — Insight Amber) -->
    <circle cx="100" cy="100" r="6" fill="#FBBF24"/>
    <circle cx="100" cy="100" r="10" fill="#FBBF24" opacity="0.2"/>

    <!-- Left peak node -->
    <circle cx="65" cy="85" r="3.5" fill="#FBBF24" opacity="0.8"/>
    <!-- Right peak node -->
    <circle cx="135" cy="85" r="3.5" fill="#FBBF24" opacity="0.8"/>

    <!-- Bottom nodes -->
    <circle cx="65" cy="130" r="3" fill="#2DD4BF" opacity="0.7"/>
    <circle cx="135" cy="130" r="3" fill="#2DD4BF" opacity="0.7"/>

    <!-- Top node -->
    <circle cx="100" cy="60" r="3" fill="#FBBF24" opacity="0.6"/>

    <!-- Side nodes -->
    <circle cx="70" cy="120" r="2" fill="#2DD4BF" opacity="0.5"/>
    <circle cx="130" cy="120" r="2" fill="#2DD4BF" opacity="0.5"/>
    <circle cx="75" cy="75" r="2" fill="#FBBF24" opacity="0.5"/>
    <circle cx="125" cy="75" r="2" fill="#FBBF24" opacity="0.5"/>

    <!-- Brace nodes -->
    <circle cx="65" cy="162" r="1.5" fill="#2DD4BF" opacity="0.4"/>
    <circle cx="90" cy="165" r="1.5" fill="#2DD4BF" opacity="0.4"/>
    <circle cx="125" cy="162" r="1.5" fill="#2DD4BF" opacity="0.4"/>
    <circle cx="100" cy="165" r="1.5" fill="#2DD4BF" opacity="0.4"/>
  </g>

  <!-- Upward trend arrow (subtle) -->
  <path d="M45 170 L155 55" stroke="#FBBF24" stroke-width="0.8" opacity="0.15" stroke-dasharray="4 4"/>
</svg>
